services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      SENTINEL_DATA_ROOT: /var/lib/sentinel
      SENTINEL_SESSION_SECRET: ${SENTINEL_SESSION_SECRET}
    volumes:
      - sentinel-data:/var/lib/sentinel
    ports:
      - "3000:3000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      NODE_ENV: production
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  sentinel-data:
