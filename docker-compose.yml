services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    ports: ["5432:5432"]
    volumes: [sentinel_pg:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports: ["6379:6379"]
    volumes: [sentinel_valkey:/data]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build: { context: ., dockerfile: apps/worker/Dockerfile }
    environment:
      DATABASE_URL: postgresql://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379
      PORT: 4010
      SCAN_CONCURRENCY: 2
      SCAN_ATTEMPTS: 3
      SCAN_TIMEOUT_MS: 900000
      CLONE_TIMEOUT_MS: 180000
      MAX_REPOSITORY_FILES: 25000
      MAX_REPOSITORY_BYTES: 524288000
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["4010:4010"]
    read_only: true
    tmpfs:
      - /tmp:size=768m,mode=1777
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.5
    restart: unless-stopped

  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    environment:
      DATABASE_URL: postgresql://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379
      WORKER_URL: http://worker:4010
      DEMO_MODE: "false"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      worker: { condition: service_started }
    ports: ["3000:3000"]
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

volumes:
  sentinel_pg:
  sentinel_valkey:
